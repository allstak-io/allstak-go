name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Tag & Publish Go Module
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - run: go mod verify
      - run: go vet ./...
      - run: go test -race ./...

      - name: Trigger proxy indexing
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          MODULE=$(go list -m)
          curl -fsSL "https://proxy.golang.org/${MODULE}/@v/${VERSION}.info" || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
